<div class="top-menu">
  <img class="logo" src="https://angular-academy.s3.amazonaws.com/main-logo/main-page-logo-small-hat.png" alt="">
</div>

<div class="courses">
  @for (course of COURSES; track course.id) {
    {{ $index + 1 }} out of {{ $count }}
    <app-course-card (courseSelected)="onCourseSelected($event)"
                     [class.is-first]="$first"
                     [class.is-last]="$last"
                     [class.is-even]="$even"
                     [class.is-odd]="$odd"
                     [course]="course"
                     [index]="$index"
    />
  } @empty {
    <h1>No courses found!</h1>
  }
</div>

<section>
  <app-is-server-running/>
  <br/>
  <br/>
  <app-user/>
  <br/>
  <br/>
</section>
